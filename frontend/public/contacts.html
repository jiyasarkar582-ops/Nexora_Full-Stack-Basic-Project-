<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexora Contacts | Developer Admin</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --font-sans: "Inter", "Plus Jakarta Sans", system-ui, sans-serif;
      --color-brand-bg: #08090A;
      --color-brand-secondary: #0D0E10;
      --color-brand-card: #121316;
      --color-brand-indigo: #10B981;
      --color-brand-violet: #34D399;
      --color-border: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--color-brand-bg);
      color: var(--text-main);
      min-height: 100vh;
      padding: 3rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Background glow effect */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.08) 0%, rgba(52, 211, 153, 0.02) 50%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      position: relative;
      z-index: 10;
    }

    header {
      margin-bottom: 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 2.5rem;
      height: 2.5rem;
      background: linear-gradient(135deg, var(--color-brand-indigo), var(--color-brand-violet));
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
    }

    .logo-icon svg {
      width: 1.25rem;
      height: 1.25rem;
      color: #fff;
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #fff;
    }

    .logo-text span {
      color: var(--color-brand-indigo);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: 0.75rem;
      background-color: rgba(255, 255, 255, 0.02);
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.15);
      background-color: rgba(255, 255, 255, 0.05);
    }

    h2 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #ffffff 40%, var(--color-brand-violet) 100%);
      -webkit-background-clip: text;
      -webkit-fill-color: transparent;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .table-container {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 1rem;
      background-color: var(--color-brand-card);
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.875rem;
    }

    th {
      background-color: var(--color-brand-secondary);
      color: var(--text-main);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--color-border);
      font-family: monospace;
    }

    td {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--color-border);
      color: var(--text-muted);
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      color: #fff;
      background-color: rgba(255, 255, 255, 0.01);
    }

    .col-id {
      color: var(--color-brand-indigo);
      font-weight: 600;
      font-family: monospace;
    }

    .col-name {
      color: #fff;
      font-weight: 500;
    }

    .col-email {
      font-family: monospace;
    }

    .col-message {
      line-height: 1.5;
      max-width: 400px;
      word-wrap: break-word;
    }

    /* Live connection status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      margin-bottom: 1.5rem;
    }

    .status-badge.online {
      background-color: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-badge.offline {
      background-color: rgba(245, 158, 11, 0.1);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .status-dot {
      width: 0.375rem;
      height: 0.375rem;
      border-radius: 50%;
      background-color: currentColor;
    }

    .status-dot.pulse {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.9);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.2);
        opacity: 1;
      }
      100% {
        transform: scale(0.9);
        opacity: 0.6;
      }
    }

    /* Loader */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .spinner {
      border: 3px solid rgba(16, 185, 129, 0.1);
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      border-left-color: var(--color-brand-indigo);
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 3rem;
      height: 3rem;
      margin-bottom: 1rem;
      color: rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 640px) {
      body {
        padding: 1.5rem 1rem;
      }
      
      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead tr {
        position: absolute;
        top: -9999px;
        left: -9999px;
      }

      tr {
        border-bottom: 1px solid var(--color-border);
        padding: 1rem 0;
      }

      td {
        border: none;
        padding: 0.5rem 1rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      td::before {
        content: attr(data-label);
        font-weight: 600;
        font-family: monospace;
        text-transform: uppercase;
        font-size: 0.75rem;
        color: var(--text-main);
        width: 120px;
        flex-shrink: 0;
      }

      .col-message {
        max-width: none;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="logo-area">
        <div class="logo-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" />
          </svg>
        </div>
        <span class="logo-text">Nex<span>ora</span></span>
      </div>
      <a href="/#" class="back-btn">
        <svg style="width: 1rem; height: 1rem;" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Back to App
      </a>
    </header>

    <h2>All Contacts</h2>
    <p class="subtitle">Real-time database submission logs for Nexora contact form inquiries.</p>

    <div id="statusBadge" class="status-badge offline">
      <span class="status-dot"></span>
      <span id="statusText">Connecting...</span>
    </div>

    <div class="table-container">
      <div id="loading" class="loader">
        <div class="spinner"></div>
        <p>Fetching contacts from database...</p>
      </div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
        </svg>
        <p>No submissions found. Submit an inquiry through the contact form to see it here!</p>
      </div>

      <table id="contactsTable" style="display: none;" border="1">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="contactTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    const statusBadge = document.getElementById("statusBadge");
    const statusText = document.getElementById("statusText");
    const loadingEl = document.getElementById("loading");
    const emptyStateEl = document.getElementById("emptyState");
    const tableEl = document.getElementById("contactsTable");
    const tableBody = document.getElementById("contactTable");

    // Primary backend endpoint URL
    const API_URL = "http://localhost:8080/contacts";

    function updateStatus(isOnline, text) {
      statusBadge.className = `status-badge ${isOnline ? 'online' : 'offline'}`;
      statusText.textContent = text;
      
      const dot = statusBadge.querySelector('.status-dot');
      if (isOnline) {
        dot.classList.add('pulse');
      } else {
        dot.classList.remove('pulse');
      }
    }

    function renderContacts(data) {
      loadingEl.style.display = "none";
      
      if (!data || data.length === 0) {
        emptyStateEl.style.display = "block";
        tableEl.style.display = "none";
        return;
      }

      emptyStateEl.style.display = "none";
      tableEl.style.display = "table";
      tableBody.innerHTML = ""; // clear

      data.forEach(c => {
        const row = `
          <tr>
            <td class="col-id" data-label="ID">${c.id}</td>
            <td class="col-name" data-label="Name">${c.name}</td>
            <td class="col-email" data-label="Email">${c.email}</td>
            <td class="col-message" data-label="Message">${c.message}</td>
          </tr>
        `;
        tableBody.innerHTML += row;
      });
    }

    // Fetch call to backend
    fetch(API_URL)
      .then(res => {
        if (!res.ok) throw new Error("HTTP error " + res.status);
        return res.json();
      })
      .then(data => {
        updateStatus(true, "MySQL Database Online");
        renderContacts(data);
      })
      .catch(err => {
        console.warn("Backend API not reachable. Checking local storage fallback...", err);
        
        // Fallback to local storage (demo mode)
        try {
          const localData = JSON.parse(localStorage.getItem("local_contacts") || "[]");
          updateStatus(false, `Local Storage Fallback (Backend Offline)`);
          renderContacts(localData);
        } catch (storageErr) {
          console.error("Local storage read failed:", storageErr);
          updateStatus(false, "Connection Failed");
          loadingEl.style.display = "none";
          emptyStateEl.style.display = "block";
        }
      });
  </script>
</body>
</html>
